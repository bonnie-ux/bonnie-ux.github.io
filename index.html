    <script>
    const announcements = [{"id":"meal-heating-rules","title":"橘時咖啡 員工自備餐點加熱規範公告","date":"2026-07-13","category":"urgent","type":"重要","summary":"為維護門市營運安全、設備正常使用及店內環境整潔，即日起員工自備餐點僅限使用微波爐加熱。","tags":["重要","需簽到","設備規範"],"keyPoints":["僅限使用微波爐加熱個人餐點。","禁止使用蒸烤箱、極速烤箱、電磁爐及其他未允許設備。","使用後須立即清潔微波爐內部及周邊環境。","不可使用不可微波材質容器。","使用不當造成設備損壞、異味、污染或安全問題須自行負責。"],"body":"\u003ch4\u003e公告目的\u003c/h4\u003e\u003cp\u003e為維護門市營運安全、設備正常使用及店內環境整潔，即日起，員工自行攜帶之餐點加熱方式，統一規範如下：\u003c/p\u003e\u003ch4\u003e一、可使用設備\u003c/h4\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003e僅限使用「微波爐」加熱餐點。\u003c/strong\u003e\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e二、禁止使用設備\u003c/h4\u003e\u003cp\u003e禁止使用以下設備加熱或烹調個人餐點：\u003c/p\u003e\u003col\u003e\u003cli\u003e蒸烤箱\u003c/li\u003e\u003cli\u003e極速烤箱\u003c/li\u003e\u003cli\u003e電磁爐\u003c/li\u003e\u003cli\u003e其他非公司允許之加熱設備\u003c/li\u003e\u003c/ol\u003e\u003ch4\u003e三、使用規範\u003c/h4\u003e\u003col\u003e\u003cli\u003e使用微波爐後，請立即清潔內部及周邊環境。\u003c/li\u003e\u003cli\u003e加熱時請注意容器安全，禁止使用不可微波材質。\u003c/li\u003e\u003cli\u003e如因個人使用不當造成設備損壞、異味、污染或安全問題，須自行負責。\u003c/li\u003e\u003cli\u003e請避免於尖峰營業時段長時間使用設備，以免影響門市作業。\u003c/li\u003e\u003c/ol\u003e\u003ch4\u003e四、其他事項\u003c/h4\u003e\u003cp\u003e本規範為維護全體同仁工作環境與營運安全，請各位同仁共同配合遵守。\u003c/p\u003e\u003cp\u003e如有違反規定情形，門市將視狀況進行勸導、管理及懲處。\u003c/p\u003e\u003cp\u003e感謝大家的理解與配合。\u003c/p\u003e"},{"id":"food-quality-plating","title":"餐點品質與排餐製作流程注意事項","date":"2026-07-13","category":"urgent","type":"重要","summary":"近期顧客反應餐點品質參差不齊，請各門市務必依排餐製作流程、噴水包覆與出餐標籤規範執行。","tags":["重要","需簽到","餐點品質"],"keyPoints":["排餐製作依生菜醬料、飯糰米魔方備料、肉品加熱、飯糰微波、米魔方進極速烤箱順序執行。","飯糰務必大量噴水並用烘焙紙完整包好。","米魔方切三等份後噴水，上下皆需用烘焙紙蓋好，不可裸露。","餐點多時請出標籤貼紙，避免製作混亂。","出餐單請叉在叉單架上，不要出完立刻丟棄。"],"body":"\u003ch4\u003e重要提醒\u003c/h4\u003e\u003cp\u003e近期顧客反應餐點品質參差不齊，以下注意事項請大家務必遵守。\u003c/p\u003e\u003ch4\u003e排餐製作流程\u003c/h4\u003e\u003cp\u003e適用門市：林運、新竹、彰秀。\u003c/p\u003e\u003col\u003e\u003cli\u003e生菜、醬料。\u003c/li\u003e\u003cli\u003e飯糰、米魔方先噴水包好備用。\u003c/li\u003e\u003cli\u003e肉品進蒸烤箱。\u003c/li\u003e\u003cli\u003e肉品剩 60 秒完成時，飯糰進微波。\u003c/li\u003e\u003cli\u003e米魔方進極速烤箱。\u003c/li\u003e\u003c/ol\u003e\u003ch4\u003e排餐飯糰\u003c/h4\u003e\u003cul\u003e\u003cli\u003e務必水要噴很多，約 20 下。\u003c/li\u003e\u003cli\u003e再用烘焙紙包好，不可有空隙。\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e排餐米魔方\u003c/h4\u003e\u003cul\u003e\u003cli\u003e切成三等份後噴水。\u003c/li\u003e\u003cli\u003e上下皆需用烘焙紙蓋好，不可裸露。\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e出餐與現場管理\u003c/h4\u003e\u003cul\u003e\u003cli\u003e如遇餐點很多時，容易不知道做到哪，點餐時要出標籤貼紙，以避免造成混亂。\u003c/li\u003e\u003cli\u003e出餐的單子請不要出完馬上丟垃圾桶，請叉在叉單架上，以防餐點有問題時還需要查找。\u003c/li\u003e\u003cli\u003e米魔方、飯糰、帕尼尼所使用的烘焙紙請重複利用。\u003c/li\u003e\u003c/ul\u003e"},{"id":"allowance-policy-20260301","title":"3/1 起津貼制度統一調整公告","date":"2026-03-01","category":"urgent","type":"重要","summary":"2026/3/1 起實施排班津貼與小組長津貼制度，請全體夥伴務必確認津貼發放、遲到扣減與取消條件。","tags":["重要","需簽到","津貼制度"],"keyPoints":["當月實際出勤未滿 100 小時不發放津貼。","達 100 小時含以上發放 1,500 元津貼。","當月遲到 1 次扣除 50%，遲到 2 次含以上全額取消。","客訴成立、當月離職、品保缺失或重點業務缺失，當月津貼全額取消。","小組長請假次數過高將影響考績分數。"],"body":"\u003ch4\u003e排班津貼／小組長津貼制度說明\u003c/h4\u003e\u003cp\u003e2026/3/1 起實施。為統一制度並鼓勵穩定排班與落實門市紀律，相關津貼規則如下：\u003c/p\u003e\u003ch4\u003e一、工讀生【排班津貼】\u003c/h4\u003e\u003cul\u003e\u003cli\u003e當月實際出勤未滿 100 小時：不發放排班津貼。\u003c/li\u003e\u003cli\u003e當月實際出勤達 100 小時（含）以上：發放排班津貼 1,500 元。\u003c/li\u003e\u003cli\u003e當月遲到 1 次：津貼扣除 50%。\u003c/li\u003e\u003cli\u003e當月遲到 2 次（含）以上：當月津貼全額取消。\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e二、小組長【小組長津貼】\u003c/h4\u003e\u003cul\u003e\u003cli\u003e當月實際出勤未滿 100 小時：不發放小組長津貼。\u003c/li\u003e\u003cli\u003e當月實際出勤達 100 小時（含）以上：發放小組長津貼 1,500 元。\u003c/li\u003e\u003cli\u003e當月遲到 1 次：津貼扣除 50%。\u003c/li\u003e\u003cli\u003e當月遲到 2 次（含）以上：當月津貼全額取消。\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e三、以下情形，當月津貼一律全額取消\u003c/h4\u003e\u003col\u003e\u003cli\u003e客訴成立（Google 評論一星）。\u003c/li\u003e\u003cli\u003e當月離職者。\u003c/li\u003e\u003cli\u003e品保管理缺失：門市出現過期品、壞品，或未依規定如實進行系統 key in 登錄。\u003c/li\u003e\u003cli\u003e重點業務缺失：未經同意擅自飲用試作飲品、食用報廢商品、擅自核銷禮物券、預訂商品未完成結帳或造成金庫短缺、挪用公款、要求或引導客人匯入私人帳戶、上班時間處理私事或滑手機影響工作。\u003c/li\u003e\u003c/ol\u003e\u003ch4\u003e四、考績說明（小組長適用）\u003c/h4\u003e\u003cul\u003e\u003cli\u003e小組長考績列入評核項目。\u003c/li\u003e\u003cli\u003e請假次數過高，將影響當期考績分數。\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e五、補充說明\u003c/h4\u003e\u003cul\u003e\u003cli\u003e津貼屬於「穩定排班與紀律表現獎勵」，非固定薪資。\u003c/li\u003e\u003cli\u003e以當月實際出勤、紀律與考核紀錄為認定依據。\u003c/li\u003e\u003cli\u003e本公告自 2026/3/1 起實施。\u003c/li\u003e\u003cli\u003e門市保留最終解釋與調整權利。\u003c/li\u003e\u003c/ul\u003e"},{"id":"sampling-waste-rules","title":"試吃試喝／報廢品管理規範","date":"2026-07-13","category":"urgent","type":"重要","summary":"因近期後台系統顯示數據異常，重申試吃試喝及報廢品管理規範，未經同意不得自行飲用、食用或取用。","tags":["重要","需簽到","庫存管理"],"keyPoints":["試吃試喝須經主管事前同意。","未經主管同意，不得自行飲用或食用任何產品。","核准試吃試喝須依規定登記。","報廢品須由主管確認後處理。","報廢品需確實登記，不得私自取用或帶離門市。"],"body":"\u003ch4\u003e公告說明\u003c/h4\u003e\u003cp\u003e因近期後台系統顯示數據異常，為確保帳務及庫存資料正確，特重申試吃試喝及報廢品管理規範如下：\u003c/p\u003e\u003ch4\u003e一、試吃試喝規範\u003c/h4\u003e\u003cul\u003e\u003cli\u003e試吃試喝須經主管事前同意。\u003c/li\u003e\u003cli\u003e未經主管同意，不得自行飲用或食用任何產品。\u003c/li\u003e\u003cli\u003e經核准之試吃試喝，須依規定登記。\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e二、報廢品規範\u003c/h4\u003e\u003cul\u003e\u003cli\u003e報廢品須由主管確認後處理。\u003c/li\u003e\u003cli\u003e報廢品需確實登記，不得私自取用或帶離門市。\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e請全體同仁確實遵守相關規定，違反者將依公司管理辦法處理。\u003c/p\u003e\u003cp\u003e橘時咖啡\u003cbr\u003e營運管理單位\u003c/p\u003e"},{"id":"new-staff-training-rules","title":"新人教育訓練與製作失誤規範","date":"2026-07-13","category":"general","type":"一般","summary":"為落實教育訓練制度並確保營運品質，公告新人二週教育訓練期與訓練期滿後製作失誤相關規範。","tags":["需簽到","教育訓練"],"keyPoints":["新人教育訓練期為二週。","教育訓練期間內，製作錯誤由主管依實際情況指導、處理並回報總部。","新人滿二週教育訓練期後，視同已具備基本製作能力。","訓練期滿後若製作錯誤致產品無法販售，須由本人自行結帳買單。"],"body":"\u003ch4\u003e公告說明\u003c/h4\u003e\u003cp\u003e為落實教育訓練制度並確保營運品質，特公告新人教育訓練及製作失誤相關規範如下：\u003c/p\u003e\u003ch4\u003e一、新人教育訓練期\u003c/h4\u003e\u003cul\u003e\u003cli\u003e新人教育訓練期為二週。\u003c/li\u003e\u003cli\u003e教育訓練期間內，製作錯誤將由主管依實際情況指導與處理，並回報總部。\u003c/li\u003e\u003c/ul\u003e\u003ch4\u003e二、訓練期滿後規範\u003c/h4\u003e\u003cul\u003e\u003cli\u003e新人滿二週教育訓練期後，視同已具備基本製作能力。\u003c/li\u003e\u003cli\u003e若於訓練期滿後發生飲品或餐點製作錯誤，致產品無法販售者，須由本人自行結帳買單。\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e請同仁務必留意製作流程並確實遵守規範，如有疑問請洽值班主管。\u003c/p\u003e\u003cp\u003e橘時咖啡\u003cbr\u003e營運管理單位\u003c/p\u003e"},{"id":"staff-purchase-checkout-rules","title":"門市商品取用與結帳規範提醒","date":"2026-07-13","category":"urgent","type":"重要","summary":"近日門市實際庫存與銷售量有落差，提醒所有商品皆須完成結帳，嚴禁未付款即自行取用。","tags":["重要","需簽到","結帳規範"],"keyPoints":["所有商品均需結帳，包含飲品與食品。","門市夥伴取用商品時，務必由第三人完成結帳程序。","不得本人自行結帳，不得擅自取用未付款商品。","除公司公告需夥伴試喝或試吃之商品，方可試喝或試吃。","若發現未結帳自行取用商品，將依公司規定處理。"],"body":"\u003ch4\u003e重要提醒\u003c/h4\u003e\u003cp\u003e近日門市實際庫存跟實際銷售量有落差，經查核發現有門市夥伴未經結帳即自行飲用門市商品飲品的情況。\u003c/p\u003e\u003cp\u003e為維護門市營運秩序及公平性，特此公告提醒：\u003c/p\u003e\u003ch4\u003e所有商品均需結帳\u003c/h4\u003e\u003cp\u003e無論是顧客或門市夥伴，所有取用的商品（包括飲品、食品等）必須經過結帳程序，嚴禁未付款即自行取用。\u003c/p\u003e\u003ch4\u003e夥伴內部規範\u003c/h4\u003e\u003col\u003e\u003cli\u003e於取用商品時務必由第三人完成結帳程序，不得本人自行結帳，不得擅自取用未付款商品。\u003c/li\u003e\u003cli\u003e除公司公告需門市夥伴試喝或試吃之商品，方可試喝或試吃。\u003c/li\u003e\u003c/ol\u003e\u003ch4\u003e違規處理\u003c/h4\u003e\u003cp\u003e若發現未結帳自行取用商品的情況，將依據公司規定進行處理，情節嚴重者將追究相關責任。\u003c/p\u003e\u003cp\u003e請夥伴們勿以身試法。我們希望所有夥伴共同維護門市的良好秩序，感謝大家的理解與配合！\u003c/p\u003e"}];
    const list = document.querySelector("#announcementList");
    const tabs = document.querySelectorAll(".tab");
    const searchInput = document.querySelector("#searchInput");
    const sortSelect = document.querySelector("#sortSelect");
    const resultCount = document.querySelector("#resultCount");
    const emptyState = document.querySelector("#emptyState");
    let activeFilter = "all";
    let checkinsById = JSON.parse(localStorage.getItem("announcementCheckinsById") || "{}");
    function formatDate(value) { const date = new Date(`${value}T00:00:00`); return { month: `${date.getMonth() + 1}月`, day: String(date.getDate()).padStart(2, "0"), full: value.replaceAll("-", ".") }; }
    function getVisibleItems() { const query = searchInput.value.trim().toLowerCase(); const filtered = announcements.filter((item) => { const matchesTab = activeFilter === "all" || item.category === activeFilter; const haystack = `${item.title} ${item.summary} ${item.body || ""} ${item.date} ${item.type} ${item.tags.join(" ")}`.toLowerCase(); return matchesTab && haystack.includes(query); }); return filtered.sort((a, b) => { if (sortSelect.value === "oldest") return a.date.localeCompare(b.date); if (sortSelect.value === "important") { const score = (item) => (item.category === "urgent" ? 1 : 0); return score(b) - score(a) || b.date.localeCompare(a.date); } return b.date.localeCompare(a.date); }); }
    function render() { const items = getVisibleItems(); list.innerHTML = ""; emptyState.classList.toggle("show", items.length === 0); resultCount.textContent = `${items.length} 則公告`; items.forEach((item) => { const date = formatDate(item.date); const article = document.createElement("article"); article.className = `notice ${item.category}`; article.innerHTML = `<div class="datebox"><div class="month">${date.month}</div><div class="day">${date.day}</div></div><div><h3>${item.title}</h3><p>${item.summary}</p><ul class="key-points">${(item.keyPoints || []).map((point) => `<li>${point}</li>`).join("")}</ul><div class="meta"><span class="tag">${date.full}</span>${item.tags.map((tag) => `<span class="tag ${tag === "重要" ? "important" : ""}">${tag}</span>`).join("")}</div><details class="notice-details"><summary>展開完整公告</summary><div class="notice-body">${item.body || ""}<section class="checkin-box" aria-labelledby="checkin-title-${item.id}"><h4 id="checkin-title-${item.id}">閱後簽到</h4><form class="checkin checkin-form" data-announcement-id="${item.id}"><input type="text" name="name" placeholder="姓名" aria-label="姓名" required><input type="text" name="unit" placeholder="單位／部門" aria-label="單位或部門" required><button class="button" type="submit">確認已閱讀</button><div class="message" data-checkin-message="${item.id}" role="status" aria-live="polite"></div></form><div class="checkin-list" data-checkin-list="${item.id}" aria-label="簽到紀錄"></div></section></div></details></div><span class="detail">${item.type}</span>`; list.appendChild(article); renderCheckins(item.id); }); }
    tabs.forEach((tab) => { tab.addEventListener("click", () => { tabs.forEach((item) => item.classList.remove("active")); tab.classList.add("active"); activeFilter = tab.dataset.filter; render(); }); }); searchInput.addEventListener("input", render); sortSelect.addEventListener("change", render);
    function renderCheckins(announcementId) { const checkinList = document.querySelector(`[data-checkin-list="${announcementId}"]`); if (!checkinList) return; const records = checkinsById[announcementId] || []; checkinList.innerHTML = ""; if (records.length === 0) { checkinList.innerHTML = '<div class="pin-date">目前尚無簽到紀錄</div>'; return; } records.slice().reverse().forEach((record) => { const item = document.createElement("div"), person = document.createElement("div"), name = document.createElement("div"), unit = document.createElement("div"), time = document.createElement("div"); item.className = "checkin-record"; name.className = "checkin-name"; unit.className = "pin-date"; time.className = "checkin-time"; name.textContent = record.name; unit.textContent = record.unit; time.textContent = record.time; person.append(name, unit); item.append(person, time); checkinList.appendChild(item); }); }
    list.addEventListener("submit", (event) => { if (!event.target.matches(".checkin-form")) return; event.preventDefault(); const form = event.target; const announcementId = form.dataset.announcementId; const nameInput = form.elements.name; const unitInput = form.elements.unit; const message = form.querySelector(`[data-checkin-message="${announcementId}"]`); const record = { name: nameInput.value.trim(), unit: unitInput.value.trim(), time: new Date().toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }) }; checkinsById[announcementId] = [...(checkinsById[announcementId] || []), record]; localStorage.setItem("announcementCheckinsById", JSON.stringify(checkinsById)); message.textContent = "已完成閱後簽到。"; form.reset(); renderCheckins(announcementId); });
    render();
  </script>
