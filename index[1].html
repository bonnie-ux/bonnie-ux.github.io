<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>橘時咖啡公告中心</title>
  <style>
    :root{--ink:#18202a;--muted:#66717f;--line:#dce3e8;--paper:#fbfcfb;--teal:#0f766e;--teal-dark:#115e59;--yellow:#f5b841;--coral:#db5a42;--green:#16845b;font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--paper)}button,input,select{font:inherit}
    .topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px clamp(18px,4vw,54px);background:rgba(251,252,251,.94);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}
    .brand{display:flex;align-items:center;gap:10px;font-weight:900}.brand-mark{display:grid;width:34px;height:34px;place-items:center;color:#fff;background:var(--teal);border-radius:8px}
    .nav{display:flex;gap:8px;overflow-x:auto;white-space:nowrap}.nav a{color:var(--muted);text-decoration:none;padding:8px 10px;border-radius:7px;font-size:14px;font-weight:700}.nav a:hover{color:var(--teal-dark);background:#e9f5f2}
    .hero{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(280px,.92fr);gap:clamp(22px,4vw,48px);align-items:center;padding:clamp(24px,5vw,64px) clamp(18px,4vw,54px) 28px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,rgba(15,118,110,.1),transparent 42%),linear-gradient(315deg,rgba(245,184,65,.16),transparent 36%),#f7faf8}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;margin-bottom:14px;color:var(--teal-dark);font-size:14px;font-weight:900}.dot{width:9px;height:9px;border-radius:999px;background:var(--coral)}
    h1{margin:0;font-size:clamp(36px,7vw,72px);line-height:1;letter-spacing:0}.lead{max-width:650px;margin:18px 0 24px;color:#46515d;font-size:clamp(16px,2vw,20px);line-height:1.7}
    .button{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border:1px solid transparent;border-radius:8px;color:#fff;background:var(--teal);text-decoration:none;font-weight:900;cursor:pointer}
    .hero-board{min-height:260px;border-radius:8px;border:1px solid #cfd9dc;background:linear-gradient(180deg,#fff,#f4f8f7);box-shadow:0 18px 50px rgba(24,32,42,.12);padding:22px;display:grid;gap:14px;align-content:center}.board-line{height:18px;border-radius:6px;background:#dcebe8}.board-line:nth-child(2){width:78%;background:#ffe7df}.board-line:nth-child(3){width:88%;background:#fff0c9}.board-card{padding:16px;border:1px solid var(--line);border-left:5px solid var(--coral);border-radius:8px;background:white;font-weight:900}
    main{padding:28px clamp(18px,4vw,54px) 54px}.dashboard{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:24px;align-items:start}
    .toolbar{display:grid;grid-template-columns:minmax(180px,1fr) 180px;gap:12px;margin-bottom:16px}.search,.select{width:100%;min-height:44px;padding:0 13px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;outline:none}.search:focus,.select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,118,110,.15)}
    .tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}.tab{min-height:38px;padding:0 13px;color:#475464;background:#fff;border:1px solid var(--line);border-radius:8px;cursor:pointer;font-weight:800}.tab.active{color:#fff;background:var(--ink);border-color:var(--ink)}
    .section-title{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:0 0 14px}h2{margin:0;font-size:24px}.count{color:var(--muted);font-size:14px;font-weight:800}.announcements{display:grid;gap:12px}
    .notice{display:grid;grid-template-columns:96px minmax(0,1fr) auto;gap:18px;align-items:start;padding:18px;background:#fff;border:1px solid var(--line);border-left:5px solid var(--coral);border-radius:8px}.datebox{padding:10px;text-align:center;background:#f4f7f7;border-radius:8px;min-width:86px}.month{color:var(--muted);font-size:13px;font-weight:900}.day{margin-top:2px;font-size:30px;line-height:1;font-weight:900}
    .notice h3{margin:0 0 8px;font-size:19px}.notice p{margin:0;color:#526070;line-height:1.65}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.tag{display:inline-flex;align-items:center;min-height:26px;padding:0 9px;border-radius:999px;background:#edf2f4;color:#41505f;font-size:12px;font-weight:900}.tag.important{color:#8f2d1e;background:#ffece7}.key-points{display:grid;gap:6px;margin:12px 0 0;padding-left:20px;color:#3f4c59;line-height:1.55}.detail{white-space:nowrap;color:var(--teal-dark);font-weight:900;padding-top:6px}
    .notice-details{margin-top:14px}.notice-details summary{color:var(--teal-dark);cursor:pointer;font-weight:900}.notice-body{display:grid;gap:14px;margin-top:14px;padding:16px;background:#f8faf9;border:1px solid var(--line);border-radius:8px;color:#364250;line-height:1.72}.notice-body h4{margin:0;color:var(--ink);font-size:17px}.notice-body p,.notice-body ol,.notice-body ul,.notice-body blockquote{margin:0}.notice-body ol,.notice-body ul{padding-left:22px}.notice-body blockquote{padding:10px 12px;background:#fff;border-left:4px solid var(--yellow);border-radius:6px;font-weight:800}
    .side{display:grid;gap:16px}.panel{padding:18px;background:#fff;border:1px solid var(--line);border-radius:8px}.panel h2{margin-bottom:12px;font-size:20px}.pin-title{margin:0 0 5px;font-weight:900}.pin-date{color:var(--muted);font-size:13px;font-weight:800}.message{min-height:21px;color:var(--green);font-size:14px;font-weight:800}
    .checkin{display:grid;gap:10px}.checkin-box{margin-top:16px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:8px}.checkin-box h4{margin:0 0 12px}.checkin input{min-height:42px;padding:0 12px;border:1px solid var(--line);border-radius:8px}.checkin-list{display:grid;gap:9px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}.checkin-record{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px;background:#f6f8f8;border-radius:8px;font-size:14px}.checkin-name{font-weight:900}.checkin-time{color:var(--muted);white-space:nowrap;font-size:12px;font-weight:800}
    .empty{display:none;padding:24px;color:var(--muted);background:#fff;border:1px dashed #bdc7d1;border-radius:8px;text-align:center;font-weight:800}.empty.show{display:block}footer{padding:24px clamp(18px,4vw,54px);color:var(--muted);border-top:1px solid var(--line);background:#fff;font-size:14px}
    @media(max-width:900px){.hero,.dashboard{grid-template-columns:1fr}.side{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){.topbar{align-items:flex-start;flex-direction:column}.toolbar,.side{grid-template-columns:1fr}.notice{grid-template-columns:1fr}.datebox{display:flex;align-items:baseline;justify-content:space-between;width:100%;min-width:0}.detail{padding-top:0}}
  </style>
</head>
<body>
  <header class="topbar"><div class="brand" aria-label="橘時咖啡公告中心"><span class="brand-mark" aria-hidden="true">!</span><span>橘時咖啡公告中心</span></div><nav class="nav" aria-label="主要導覽"><a href="#latest">最新公告</a><a href="#important">重要事項</a></nav></header>
  <section class="hero"><div><div class="eyebrow"><span class="dot"></span> 即時更新</div><h1>橘時咖啡公告中心</h1><p class="lead">集中整理最新消息、活動提醒、系統維護與行政通知，讓每位成員都能快速找到需要知道的事。</p><a class="button" href="#latest">查看公告</a></div><div class="hero-board" aria-label="公告牆視覺圖"><div class="board-card">門市掃碼點餐流程公告</div><div class="board-line"></div><div class="board-line"></div><div class="board-line"></div></div></section>
  <main><div class="dashboard"><section id="latest" aria-labelledby="latest-title"><div class="section-title"><h2 id="latest-title">最新公告</h2><span class="count" id="resultCount">0 則公告</span></div><div class="toolbar"><input class="search" id="searchInput" type="search" placeholder="搜尋公告、日期或關鍵字" aria-label="搜尋公告"><select class="select" id="sortSelect" aria-label="排序公告"><option value="newest">最新優先</option><option value="oldest">最舊優先</option><option value="important">重要優先</option></select></div><div class="tabs" aria-label="公告分類"><button class="tab active" type="button" data-filter="all">全部</button><button class="tab" type="button" data-filter="urgent">重要</button><button class="tab" type="button" data-filter="event">活動</button><button class="tab" type="button" data-filter="service">維護</button><button class="tab" type="button" data-filter="general">一般</button></div><div class="announcements" id="announcementList"></div><div class="empty" id="emptyState">沒有符合條件的公告</div></section><aside class="side"><section class="panel" id="important" aria-labelledby="important-title"><h2 id="important-title">置頂提醒</h2><div class="pin-item"><p class="pin-title">門市掃碼點餐流程公告</p><div class="pin-date">請閱讀後完成簽到</div></div></section></aside></div></main>
  <footer>橘時咖啡公告中心 · 最後更新：2026 年 6 月 29 日</footer>
  <script>
    const announcements=[{title:"門市掃碼點餐｜進店引客、結帳與取餐流程公告",date:"2026-06-29",category:"urgent",type:"重要",summary:"即日起門市雖開始使用掃碼點餐，仍須主動提供紙本菜單給每位顧客，並依統一流程完成接待、結帳與取餐引導。",tags:["重要","需簽到"],keyPoints:["每位顧客進店都要主動提供紙本菜單。","內用客人入座後，引導掃桌上 QR Code 點餐。","掃碼完成後，仍須到櫃檯確認訂單並結帳。","櫃檯需再次確認內用／外帶、餐點、甜度冰量與加購品項。","餐點完成後依電視叫號至出餐口取餐，並附小白單避免拿錯。"],body:`<h4>公告目的</h4><p>即日起門市雖開始使用掃碼點餐，<strong>仍須主動提供紙本菜單給每位顧客</strong>，協助客人快速了解品項與完成點餐。</p><h4>一、進店接待流程</h4><ol><li><strong>主動招呼顧客</strong><ul><li>歡迎光臨橘時咖啡。</li><li>詢問客人：「請問內用還是外帶呢？」</li></ul></li><li><strong>提供菜單</strong><ul><li>內用、外帶客人皆需提供菜單。</li><li>內用客人入座後，可告知桌面有掃碼點餐 QR Code。</li></ul></li><li><strong>引導掃碼點餐</strong><ul><li>「菜單可以先參考，桌上有 QR Code 可以直接掃碼點餐。」</li><li>「點餐完成後，再麻煩至櫃檯結帳即可。」</li></ul></li><li><strong>櫃檯結帳</strong><ul><li>客人掃碼完成點餐後，至櫃檯確認訂單與付款。</li><li>櫃檯人員需再次確認：內用／外帶、餐點內容、甜度冰量及加購品項。</li></ul></li><li><strong>叫號與取餐</strong><ul><li>結帳完成後告知客人：「完成後會由電視叫號，請留意螢幕通知，再至出餐口取餐。」</li><li>飲品與餐點依完成狀況分開叫號、分開出餐。</li><li>出餐口須放置木盤及小白單，避免餐點、飲品拿錯。</li></ul></li></ol><h4>二、統一接待話術</h4><blockquote>歡迎光臨橘時咖啡，請問內用還是外帶呢？</blockquote><blockquote>這是我們的菜單，內用桌上有 QR Code 可以直接掃碼點餐。</blockquote><blockquote>點餐完成後，再麻煩到櫃檯結帳。</blockquote><blockquote>餐點完成會顯示在電視叫號螢幕，再請您至出餐口取餐，謝謝您。</blockquote><h4>三、門市人員注意事項</h4><ul><li>不可因為有掃碼點餐，就不主動提供菜單。</li><li>不熟悉掃碼操作的客人，須主動協助。</li><li>長輩、親子客或趕時間的客人，可直接引導至櫃檯人工點餐。</li><li>客人完成掃碼後，未結帳前不算完成訂單。</li><li>飲品與餐點請依叫號流程分開通知，避免客人誤取。</li><li>出餐口每一份餐點或飲品都必須附小白單確認單號。</li></ul><p>請各門市同仁統一依照以上流程執行，讓客人即使第一次使用掃碼點餐，也能清楚、快速完成點餐與取餐。</p>`}];
    const list=document.querySelector("#announcementList"),tabs=document.querySelectorAll(".tab"),searchInput=document.querySelector("#searchInput"),sortSelect=document.querySelector("#sortSelect"),resultCount=document.querySelector("#resultCount"),emptyState=document.querySelector("#emptyState");let activeFilter="all",checkins=JSON.parse(localStorage.getItem("announcementCheckins")||"[]");
    function formatDate(value){const date=new Date(`${value}T00:00:00`);return{month:`${date.getMonth()+1}月`,day:String(date.getDate()).padStart(2,"0"),full:value.replaceAll("-",".")}}
    function getVisibleItems(){const query=searchInput.value.trim().toLowerCase();const filtered=announcements.filter(item=>{const matchesTab=activeFilter==="all"||item.category===activeFilter;const haystack=`${item.title} ${item.summary} ${item.body||""} ${item.date} ${item.type} ${item.tags.join(" ")}`.toLowerCase();return matchesTab&&haystack.includes(query)});return filtered.sort((a,b)=>{if(sortSelect.value==="oldest")return a.date.localeCompare(b.date);if(sortSelect.value==="important"){const score=item=>item.category==="urgent"?1:0;return score(b)-score(a)||b.date.localeCompare(a.date)}return b.date.localeCompare(a.date)})}
    function render(){const items=getVisibleItems();list.innerHTML="";emptyState.classList.toggle("show",items.length===0);resultCount.textContent=`${items.length} 則公告`;items.forEach(item=>{const date=formatDate(item.date);const article=document.createElement("article");article.className=`notice ${item.category}`;article.innerHTML=`<div class="datebox"><div class="month">${date.month}</div><div class="day">${date.day}</div></div><div><h3>${item.title}</h3><p>${item.summary}</p><ul class="key-points">${(item.keyPoints||[]).map(point=>`<li>${point}</li>`).join("")}</ul><div class="meta"><span class="tag">${date.full}</span>${item.tags.map(tag=>`<span class="tag ${tag==="重要"?"important":""}">${tag}</span>`).join("")}</div><details class="notice-details"><summary>展開完整公告</summary><div class="notice-body">${item.body||""}<section class="checkin-box" aria-labelledby="checkin-title"><h4 id="checkin-title">閱後簽到</h4><form class="checkin" id="checkinForm"><input type="text" id="nameInput" placeholder="姓名" aria-label="姓名" required><input type="text" id="unitInput" placeholder="單位／部門" aria-label="單位或部門" required><button class="button" type="submit">確認已閱讀</button><div class="message" id="checkinMessage" role="status" aria-live="polite"></div></form><div class="checkin-list" id="checkinList" aria-label="簽到紀錄"></div></section></div></details></div><span class="detail">${item.type}</span>`;list.appendChild(article)});renderCheckins()}
    tabs.forEach(tab=>{tab.addEventListener("click",()=>{tabs.forEach(item=>item.classList.remove("active"));tab.classList.add("active");activeFilter=tab.dataset.filter;render()})});searchInput.addEventListener("input",render);sortSelect.addEventListener("change",render);
    function renderCheckins(){const checkinList=document.querySelector("#checkinList");if(!checkinList)return;checkinList.innerHTML="";if(checkins.length===0){checkinList.innerHTML='<div class="pin-date">目前尚無簽到紀錄</div>';return}checkins.slice().reverse().forEach(record=>{const item=document.createElement("div"),person=document.createElement("div"),name=document.createElement("div"),unit=document.createElement("div"),time=document.createElement("div");item.className="checkin-record";name.className="checkin-name";unit.className="pin-date";time.className="checkin-time";name.textContent=record.name;unit.textContent=record.unit;time.textContent=record.time;person.append(name,unit);item.append(person,time);checkinList.appendChild(item)})}
    list.addEventListener("submit",event=>{if(!event.target.matches("#checkinForm"))return;event.preventDefault();const nameInput=event.target.querySelector("#nameInput"),unitInput=event.target.querySelector("#unitInput"),checkinMessage=event.target.querySelector("#checkinMessage");const record={name:nameInput.value.trim(),unit:unitInput.value.trim(),time:new Date().toLocaleString("zh-TW",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"})};checkins.push(record);localStorage.setItem("announcementCheckins",JSON.stringify(checkins));checkinMessage.textContent="已完成閱後簽到。";event.target.reset();renderCheckins()});render();
  </script>
</body>
</html>
